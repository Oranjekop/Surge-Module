<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Module Surge 安装</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --surface-strong: #eef4ff;
        --text: #141821;
        --muted: #647084;
        --subtle: #8a94a6;
        --border: #dbe2ec;
        --border-strong: #c6d0df;
        --accent: #2458d3;
        --accent-dark: #173f9c;
        --accent-soft: #e7efff;
        --green: #0f766e;
        --green-soft: #e6f4f1;
        --amber: #a75d00;
        --amber-soft: #fff4db;
        --rose: #b42343;
        --shadow: 0 16px 40px rgba(32, 45, 68, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, #fbfcff 0, var(--bg) 240px),
          var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        line-height: 1.5;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button,
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 38px;
        border: 1px solid var(--accent);
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        padding: 0 13px;
        text-decoration: none;
        cursor: pointer;
        transition:
          background 0.16s ease,
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.16s ease;
        white-space: nowrap;
      }

      button:hover,
      .button:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
        box-shadow: 0 8px 18px rgba(36, 88, 211, 0.18);
        transform: translateY(-1px);
      }

      .button.secondary,
      button.secondary {
        background: #fff;
        color: var(--accent);
        box-shadow: none;
      }

      .button.secondary:hover,
      button.secondary:hover {
        color: var(--accent-dark);
        border-color: var(--accent-dark);
        background: #f8fbff;
      }

      .button.ghost,
      button.ghost {
        border-color: var(--border);
        background: #fff;
        color: var(--muted);
        box-shadow: none;
      }

      .button.ghost:hover,
      button.ghost:hover {
        border-color: var(--border-strong);
        color: var(--text);
        background: var(--surface-soft);
      }

      .wrap {
        width: min(1220px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 44px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: end;
        margin-bottom: 18px;
      }

      .brand {
        display: grid;
        gap: 7px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.15;
        font-weight: 760;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .page-link {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        padding: 0 12px;
        font-size: 13px;
        text-decoration: none;
      }

      .page-link:hover {
        border-color: var(--border-strong);
        color: var(--text);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat {
        min-height: 74px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 12px 14px;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .stat strong {
        display: block;
        margin-top: 3px;
        color: var(--text);
        font-size: 24px;
        line-height: 1.1;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(160px, 220px) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 12px;
        margin-bottom: 14px;
        box-shadow: 0 6px 20px rgba(32, 45, 68, 0.05);
      }

      .field {
        position: relative;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        padding: 0 12px;
        outline: none;
      }

      .field input:focus,
      .field select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(36, 88, 211, 0.12);
      }

      .field input {
        padding-left: 40px;
      }

      .search-mark {
        position: absolute;
        left: 13px;
        top: 50%;
        width: 16px;
        height: 16px;
        border: 2px solid var(--subtle);
        border-radius: 999px;
        transform: translateY(-58%);
        pointer-events: none;
      }

      .search-mark::after {
        content: "";
        position: absolute;
        right: -6px;
        bottom: -5px;
        width: 8px;
        height: 2px;
        border-radius: 999px;
        background: var(--subtle);
        transform: rotate(45deg);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
        align-items: start;
      }

      .module-list {
        display: grid;
        gap: 10px;
      }

      .module-card,
      .detail-panel,
      .empty {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      .module-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        padding: 14px;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.16s ease;
      }

      .module-card:hover {
        border-color: var(--border-strong);
        box-shadow: 0 10px 26px rgba(32, 45, 68, 0.08);
        transform: translateY(-1px);
      }

      .module-card.is-active {
        border-color: rgba(36, 88, 211, 0.65);
        background: linear-gradient(180deg, #ffffff 0, #f8fbff 100%);
        box-shadow: 0 10px 28px rgba(36, 88, 211, 0.12);
      }

      .module-main {
        min-width: 0;
      }

      .module-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .module-name {
        margin: 0;
        font-size: 17px;
        line-height: 1.25;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .index-pill,
      .tag,
      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 8px;
        font-size: 12px;
        line-height: 1;
      }

      .index-pill {
        background: var(--surface-strong);
        color: var(--accent);
      }

      .tag {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--muted);
      }

      .status-pill {
        background: var(--green-soft);
        color: var(--green);
      }

      .module-desc {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        overflow-wrap: anywhere;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        overflow: hidden;
      }

      .file {
        margin-top: 8px;
        color: var(--subtle);
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .row-actions {
        align-self: start;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
        width: 210px;
      }

      .row-actions button,
      .row-actions .button {
        width: 100%;
        min-height: 34px;
        padding: 0 10px;
        font-size: 13px;
      }

      .detail-wrap {
        position: sticky;
        top: 16px;
      }

      .detail-panel {
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .detail-kicker {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      .detail-title {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
        font-weight: 760;
        overflow-wrap: anywhere;
      }

      .detail-desc {
        margin: 10px 0 0;
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .tagline {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 12px;
      }

      .detail-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 15px;
      }

      .detail-actions .button:first-child {
        grid-column: 1 / -1;
        min-height: 44px;
      }

      .install-box {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        padding: 11px;
      }

      .install-box span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 5px;
      }

      .install-url {
        color: #354052;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .status {
        min-height: 22px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.ok {
        color: var(--green);
      }

      .status.warn {
        color: var(--amber);
      }

      .empty {
        min-height: 180px;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      .load-error {
        border-color: rgba(180, 35, 67, 0.35);
        background: #fff7f8;
        color: var(--rose);
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .detail-wrap {
          position: static;
          order: -1;
        }
      }

      @media (max-width: 760px) {
        .wrap {
          width: min(100% - 20px, 1220px);
          padding-top: 18px;
        }

        .topbar,
        .toolbar,
        .module-card {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: start;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .row-actions {
          width: 100%;
        }

        .detail-actions {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="topbar">
        <div class="brand">
          <h1>Module Surge 安装</h1>
          <div class="meta" id="pageMeta">正在载入模块列表...</div>
        </div>
        <a class="page-link" href="https://github.com/Oranjekop/Module">GitHub / Oranjekop / Module</a>
      </header>

      <section class="stats" aria-label="模块状态">
        <div class="stat">
          <span>全部模块</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat">
          <span>当前结果</span>
          <strong id="visibleCount">0</strong>
        </div>
        <div class="stat">
          <span>分类数量</span>
          <strong id="categoryCount">0</strong>
        </div>
      </section>

      <section class="toolbar" aria-label="模块筛选">
        <label class="field" aria-label="搜索模块">
          <span class="search-mark"></span>
          <input id="search" type="search" placeholder="搜索插件、文件名、分类或描述" autocomplete="off">
        </label>
        <label class="field" aria-label="筛选分类">
          <select id="category">
            <option value="">全部分类</option>
          </select>
        </label>
        <button id="reset" class="ghost" type="button">重置</button>
      </section>

      <section class="layout" aria-label="模块安装">
        <div class="module-list" id="list">
          <div class="empty">正在载入...</div>
        </div>
        <aside class="detail-wrap">
          <section class="detail-panel" id="selected" aria-live="polite"></section>
        </aside>
      </section>
    </main>

    <script>
      const REPO = "Oranjekop/Module";
      const BRANCH = "main";
      const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH}`;
      const RAW_MANIFEST = `${RAW_BASE}/Module/manifest.json`;
      const state = {
        items: [],
        filtered: [],
        selected: null,
        categories: [],
      };

      const params = new URLSearchParams(location.search);
      const requestedModule = params.get("module") || "";
      const shouldCopy = params.get("copy") === "1";
      const searchInput = document.getElementById("search");
      const categorySelect = document.getElementById("category");
      const resetButton = document.getElementById("reset");
      const listEl = document.getElementById("list");
      const metaEl = document.getElementById("pageMeta");
      const selectedEl = document.getElementById("selected");
      const totalCountEl = document.getElementById("totalCount");
      const visibleCountEl = document.getElementById("visibleCount");
      const categoryCountEl = document.getElementById("categoryCount");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalize(value) {
        return String(value ?? "").toLowerCase();
      }

      function downloadUrl(item) {
        return item.download_url || `${RAW_BASE}/Module/${encodeURIComponent(item.output)}`;
      }

      function installUrl(item) {
        return `surge:///install-module?url=${encodeURIComponent(downloadUrl(item))}`;
      }

      function splitCategories(item) {
        return String(item.category || "")
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean);
      }

      function categoryTags(item, limit = 4) {
        const tags = splitCategories(item).slice(0, limit);
        if (!tags.length) return '<span class="tag">未分类</span>';
        return tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const area = document.createElement("textarea");
        area.value = text;
        area.setAttribute("readonly", "");
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(area);
        if (!ok) throw new Error("copy command failed");
      }

      function setStatus(message, kind = "") {
        const status = document.getElementById("status");
        if (!status) return;
        status.textContent = message;
        status.className = `status ${kind}`.trim();
      }

      async function copyInstall(item, source = "button") {
        const text = installUrl(item);
        try {
          await copyText(text);
          setStatus(`已复制 ${item.name} 的 Surge 安装链接。`, "ok");
        } catch (error) {
          setStatus("浏览器阻止了自动复制，请点复制按钮重试。", source === "auto" ? "warn" : "");
        }
      }

      function selectItem(item, options = {}) {
        state.selected = item || null;
        renderSelected();
        renderList();
        if (item && options.copy) copyInstall(item, "auto");
        if (item && options.scroll) {
          selectedEl.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }

      function renderSelected() {
        const item = state.selected;
        if (!item) {
          selectedEl.innerHTML = `
            <div class="detail-kicker">
              <span class="status-pill">等待选择</span>
            </div>
            <h2 class="detail-title">未选择模块</h2>
            <p class="detail-desc">模块载入后会在这里显示安装入口。</p>
          `;
          return;
        }

        const url = installUrl(item);
        selectedEl.innerHTML = `
          <div class="detail-kicker">
            <span class="index-pill">#${escapeHtml(item.index)}</span>
            <span class="status-pill">Surge Module</span>
          </div>
          <h2 class="detail-title">${escapeHtml(item.name)}</h2>
          <p class="detail-desc">${escapeHtml(item.desc || "暂无描述")}</p>
          <div class="tagline">${categoryTags(item, 8)}</div>
          <div class="file">${escapeHtml(item.output)}</div>
          <div class="detail-actions">
            <a class="button" href="${escapeHtml(url)}">安装到 Surge</a>
            <button id="copySelected" class="secondary" type="button">复制链接</button>
            <a class="button ghost" href="${escapeHtml(downloadUrl(item))}">模块文件</a>
          </div>
          <div class="install-box">
            <span>Surge 安装链接</span>
            <div class="install-url">${escapeHtml(url)}</div>
          </div>
          <div id="status" class="status"></div>
        `;
        document.getElementById("copySelected").addEventListener("click", () => copyInstall(item));
      }

      function renderList() {
        visibleCountEl.textContent = state.filtered.length;
        if (!state.filtered.length) {
          listEl.innerHTML = '<div class="empty">没有找到匹配的模块</div>';
          return;
        }

        listEl.innerHTML = state.filtered
          .map((item) => {
            const active = state.selected && state.selected.output === item.output ? " is-active" : "";
            return `
              <article class="module-card${active}">
                <div class="module-main">
                  <div class="module-head">
                    <span class="index-pill">#${escapeHtml(item.index)}</span>
                    ${categoryTags(item, 2)}
                  </div>
                  <h3 class="module-name">${escapeHtml(item.name)}</h3>
                  <p class="module-desc">${escapeHtml(item.desc || "暂无描述")}</p>
                  <div class="file">${escapeHtml(item.output)}</div>
                </div>
                <div class="row-actions">
                  <a class="button" href="${escapeHtml(installUrl(item))}">安装</a>
                  <button class="secondary" type="button" data-copy="${escapeHtml(item.output)}">复制</button>
                  <button class="ghost" type="button" data-select="${escapeHtml(item.output)}">详情</button>
                </div>
              </article>
            `;
          })
          .join("");

        listEl.querySelectorAll("[data-copy]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = findByOutput(button.dataset.copy);
            selectItem(item);
            copyInstall(item);
          });
        });
        listEl.querySelectorAll("[data-select]").forEach((button) => {
          button.addEventListener("click", () => {
            selectItem(findByOutput(button.dataset.select), { scroll: true });
          });
        });
      }

      function renderCategories() {
        const counts = new Map();
        state.items.forEach((item) => {
          splitCategories(item).forEach((category) => {
            counts.set(category, (counts.get(category) || 0) + 1);
          });
        });
        state.categories = [...counts.entries()]
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "zh-Hans-CN"))
          .map(([name, count]) => ({ name, count }));

        categoryCountEl.textContent = state.categories.length;
        categorySelect.innerHTML = '<option value="">全部分类</option>' + state.categories
          .map(({ name, count }) => `<option value="${escapeHtml(name)}">${escapeHtml(name)} (${count})</option>`)
          .join("");
      }

      function findByOutput(output) {
        return state.items.find((item) => item.output === output);
      }

      function itemMatchesCategory(item, category) {
        if (!category) return true;
        return splitCategories(item).includes(category);
      }

      function applyFilter(options = {}) {
        const query = normalize(searchInput.value.trim());
        const category = categorySelect.value;
        state.filtered = state.items.filter((item) => {
          const haystack = normalize([
            item.name,
            item.output,
            item.category,
            item.desc,
          ].join(" "));
          return (!query || haystack.includes(query)) && itemMatchesCategory(item, category);
        });

        if (!state.selected || !state.filtered.some((item) => item.output === state.selected.output)) {
          state.selected = state.filtered[0] || state.items[0] || null;
        }
        renderSelected();
        renderList();

        if (options.scrollTop) {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      async function loadManifest() {
        const response = await fetch(RAW_MANIFEST, { cache: "no-store" });
        if (!response.ok) throw new Error(`manifest ${response.status}`);
        return response.json();
      }

      async function main() {
        renderSelected();
        try {
          const manifest = await loadManifest();
          state.items = Array.isArray(manifest.items) ? manifest.items : [];
          state.filtered = state.items;
          totalCountEl.textContent = state.items.length;
          visibleCountEl.textContent = state.items.length;
          metaEl.textContent = `共 ${state.items.length} 个模块，数据来自 ${REPO} main 分支。`;
          renderCategories();

          searchInput.addEventListener("input", () => applyFilter());
          categorySelect.addEventListener("change", () => applyFilter({ scrollTop: true }));
          resetButton.addEventListener("click", () => {
            searchInput.value = "";
            categorySelect.value = "";
            applyFilter({ scrollTop: true });
          });

          const selected = requestedModule ? findByOutput(requestedModule) : state.items[0];
          selectItem(selected || state.items[0] || null, { copy: Boolean(selected && shouldCopy) });
        } catch (error) {
          metaEl.textContent = "模块列表载入失败。";
          listEl.innerHTML = '<div class="empty load-error">无法载入 manifest.json，请稍后重试。</div>';
          totalCountEl.textContent = "0";
          visibleCountEl.textContent = "0";
          categoryCountEl.textContent = "0";
        }
      }

      main();
    </script>
  </body>
</html>
