<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Surge-Module 安装</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --surface-strong: #eef4ff;
        --text: #141821;
        --muted: #647084;
        --subtle: #8a94a6;
        --border: #dbe2ec;
        --border-strong: #c6d0df;
        --accent: #2458d3;
        --accent-dark: #173f9c;
        --accent-soft: #e7efff;
        --green: #0f766e;
        --green-soft: #e6f4f1;
        --amber: #a75d00;
        --amber-soft: #fff4db;
        --rose: #b42343;
        --shadow: 0 16px 40px rgba(32, 45, 68, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, #fbfcff 0, var(--bg) 240px),
          var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        line-height: 1.5;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button,
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 38px;
        border: 1px solid var(--accent);
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        padding: 0 13px;
        text-decoration: none;
        cursor: pointer;
        transition:
          background 0.16s ease,
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.16s ease;
        white-space: nowrap;
      }

      button:hover,
      .button:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
        box-shadow: 0 8px 18px rgba(36, 88, 211, 0.18);
        transform: translateY(-1px);
      }

      .button.secondary,
      button.secondary {
        background: #fff;
        color: var(--accent);
        box-shadow: none;
      }

      .button.secondary:hover,
      button.secondary:hover {
        color: var(--accent-dark);
        border-color: var(--accent-dark);
        background: #f8fbff;
      }

      .button.ghost,
      button.ghost {
        border-color: var(--border);
        background: #fff;
        color: var(--muted);
        box-shadow: none;
      }

      .button.ghost:hover,
      button.ghost:hover {
        border-color: var(--border-strong);
        color: var(--text);
        background: var(--surface-soft);
      }

      .wrap {
        width: min(1220px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 44px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: end;
        margin-bottom: 18px;
      }

      .brand {
        display: grid;
        gap: 7px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.15;
        font-weight: 760;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .page-link {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        padding: 0 12px;
        font-size: 13px;
        text-decoration: none;
      }

      .page-link:hover {
        border-color: var(--border-strong);
        color: var(--text);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat {
        min-height: 74px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 12px 14px;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .stat strong {
        display: block;
        margin-top: 3px;
        color: var(--text);
        font-size: 24px;
        line-height: 1.1;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(160px, 220px) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 12px;
        margin-bottom: 14px;
        box-shadow: 0 6px 20px rgba(32, 45, 68, 0.05);
      }

      .field {
        position: relative;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        padding: 0 12px;
        outline: none;
      }

      .field input:focus,
      .field select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(36, 88, 211, 0.12);
      }

      .field input {
        padding-left: 40px;
      }

      .search-mark {
        position: absolute;
        left: 13px;
        top: 50%;
        width: 16px;
        height: 16px;
        border: 2px solid var(--subtle);
        border-radius: 999px;
        transform: translateY(-58%);
        pointer-events: none;
      }

      .search-mark::after {
        content: "";
        position: absolute;
        right: -6px;
        bottom: -5px;
        width: 8px;
        height: 2px;
        border-radius: 999px;
        background: var(--subtle);
        transform: rotate(45deg);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .module-list {
        display: grid;
        gap: 10px;
      }

      .module-card,
      .empty {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      .module-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        padding: 16px;
        cursor: pointer;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.16s ease;
      }

      .module-card:hover {
        border-color: var(--border-strong);
        box-shadow: 0 10px 26px rgba(32, 45, 68, 0.08);
        transform: translateY(-1px);
      }

      .module-card:focus-visible {
        outline: 3px solid rgba(36, 88, 211, 0.18);
        outline-offset: 2px;
        border-color: rgba(36, 88, 211, 0.7);
      }

      .module-card.is-active {
        border-color: rgba(36, 88, 211, 0.65);
        background: linear-gradient(180deg, #ffffff 0, #f8fbff 100%);
        box-shadow: 0 10px 28px rgba(36, 88, 211, 0.12);
      }

      .module-main {
        min-width: 0;
      }

      .module-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .module-name {
        margin: 0;
        font-size: 17px;
        line-height: 1.25;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .index-pill,
      .tag,
      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 8px;
        font-size: 12px;
        line-height: 1;
      }

      .index-pill {
        background: var(--surface-strong);
        color: var(--accent);
      }

      .tag {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--muted);
      }

      .status-pill {
        background: var(--green-soft);
        color: var(--green);
      }

      .module-desc {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        overflow-wrap: anywhere;
      }

      .file {
        margin-top: 8px;
        color: var(--subtle);
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .row-actions {
        align-self: start;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
        width: 180px;
      }

      .row-actions button,
      .row-actions .button {
        width: 100%;
        min-height: 34px;
        padding: 0 10px;
        font-size: 13px;
      }

      .tagline {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 12px;
      }

      .status {
        min-height: 22px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.ok {
        color: var(--green);
      }

      .status.warn {
        color: var(--amber);
      }

      .empty {
        min-height: 180px;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      .load-error {
        border-color: rgba(180, 35, 67, 0.35);
        background: #fff7f8;
        color: var(--rose);
      }

      .credits {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        margin-top: 18px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
        color: var(--muted);
        font-size: 13px;
      }

      .credits strong {
        color: var(--text);
      }

      .credits a {
        color: var(--accent);
        text-decoration: none;
      }

      .credits a:hover {
        color: var(--accent-dark);
        text-decoration: underline;
      }

      @media (max-width: 760px) {
        .wrap {
          width: min(100% - 20px, 1220px);
          padding-top: 18px;
        }

        .topbar,
        .toolbar,
        .module-card {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: start;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .row-actions {
          grid-template-columns: 1fr;
          width: 100%;
        }

        .row-actions button,
        .row-actions .button {
          min-height: 44px;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="topbar">
        <div class="brand">
          <h1>Surge-Module 安装</h1>
          <div class="meta" id="pageMeta">正在载入模块列表...</div>
        </div>
        <a class="page-link" href="https://github.com/Oranjekop/Surge-Module">GitHub / Oranjekop / Surge-Module</a>
      </header>

      <section class="stats" aria-label="模块状态">
        <div class="stat">
          <span>全部模块</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat">
          <span>当前结果</span>
          <strong id="visibleCount">0</strong>
        </div>
        <div class="stat">
          <span>分类数量</span>
          <strong id="categoryCount">0</strong>
        </div>
      </section>

      <section class="toolbar" aria-label="模块筛选">
        <label class="field" aria-label="搜索模块">
          <span class="search-mark"></span>
          <input id="search" type="search" placeholder="搜索插件、文件名、分类或描述" autocomplete="off">
        </label>
        <label class="field" aria-label="筛选分类">
          <select id="category">
            <option value="">全部分类</option>
          </select>
        </label>
        <button id="reset" class="ghost" type="button">重置</button>
      </section>
      <div id="status" class="status" aria-live="polite"></div>

      <section class="layout" aria-label="模块安装">
        <div class="module-list" id="list">
          <div class="empty">正在载入...</div>
        </div>
      </section>

      <footer class="credits">
        <strong>特别感谢</strong>
        <a href="https://github.com/luestr/ProxyResource" target="_blank" rel="noopener noreferrer">Kelee 项目</a>
        <span>及维护者长期整理、维护和分享插件资源；本页模块列表与转换流程基于</span>
        <a href="https://hub.kelee.one/" target="_blank" rel="noopener noreferrer">Kelee 插件中心</a>
        <span>提供的公开列表与原始 Loon 插件链接。</span>
      </footer>
    </main>

    <script>
      const REPO = "Oranjekop/Surge-Module";
      const BRANCH = "main";
      const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/refs/heads/${BRANCH}`;
      const RAW_MANIFEST = `${RAW_BASE}/Module/manifest.json`;
      const state = {
        items: [],
        filtered: [],
        selected: null,
        categories: [],
      };

      const params = new URLSearchParams(location.search);
      const requestedModule = params.get("module") || "";
      const shouldCopy = params.get("copy") === "1";
      const searchInput = document.getElementById("search");
      const categorySelect = document.getElementById("category");
      const resetButton = document.getElementById("reset");
      const listEl = document.getElementById("list");
      const metaEl = document.getElementById("pageMeta");
      const totalCountEl = document.getElementById("totalCount");
      const visibleCountEl = document.getElementById("visibleCount");
      const categoryCountEl = document.getElementById("categoryCount");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalize(value) {
        return String(value ?? "").toLowerCase();
      }

      function downloadUrl(item) {
        return item.download_url || `${RAW_BASE}/Module/${encodeURIComponent(item.output)}`;
      }

      function installUrl(item) {
        return `surge:///install-module?url=${encodeURIComponent(downloadUrl(item))}`;
      }

      function splitCategories(item) {
        return String(item.category || "")
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean);
      }

      function categoryTags(item, limit = 4) {
        const tags = splitCategories(item).slice(0, limit);
        if (!tags.length) return '<span class="tag">未分类</span>';
        return tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
      }

      function displayIndex(item) {
        const number = Number(item.index);
        return Number.isFinite(number) ? String(number + 1) : String(item.index || "");
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const area = document.createElement("textarea");
        area.value = text;
        area.setAttribute("readonly", "");
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(area);
        if (!ok) throw new Error("copy command failed");
      }

      function setStatus(message, kind = "") {
        const status = document.getElementById("status");
        if (!status) return;
        status.textContent = message;
        status.className = `status ${kind}`.trim();
      }

      async function copyInstall(item, source = "button") {
        const text = installUrl(item);
        try {
          await copyText(text);
          setStatus(`已复制 ${item.name} 的 Surge 安装链接。`, "ok");
        } catch (error) {
          setStatus("浏览器阻止了自动复制，请点复制按钮重试。", source === "auto" ? "warn" : "");
        }
      }

      function selectItem(item, options = {}) {
        state.selected = item || null;
        renderList();
        if (item && options.copy) copyInstall(item, "auto");
        if (item && options.scroll) {
          requestAnimationFrame(() => {
            const card = [...listEl.querySelectorAll("[data-card]")]
              .find((entry) => entry.dataset.card === item.output);
            card?.scrollIntoView({ behavior: "smooth", block: "center" });
          });
        }
      }

      function renderList() {
        visibleCountEl.textContent = state.filtered.length;
        if (!state.filtered.length) {
          listEl.innerHTML = '<div class="empty">没有找到匹配的模块</div>';
          return;
        }

        listEl.innerHTML = state.filtered
          .map((item) => {
            const active = state.selected && state.selected.output === item.output ? " is-active" : "";
            return `
              <article class="module-card${active}" data-card="${escapeHtml(item.output)}" role="button" tabindex="0" aria-label="选择 ${escapeHtml(item.name)}">
                <div class="module-main">
                  <div class="module-head">
                    <span class="index-pill">#${escapeHtml(displayIndex(item))}</span>
                    ${categoryTags(item, 2)}
                  </div>
                  <h3 class="module-name">${escapeHtml(item.name)}</h3>
                  <p class="module-desc">${escapeHtml(item.desc || "暂无描述")}</p>
                  <div class="file">${escapeHtml(item.output)}</div>
                </div>
                <div class="row-actions">
                  <a class="button" href="${escapeHtml(installUrl(item))}">安装到 Surge</a>
                  <button class="secondary" type="button" data-copy="${escapeHtml(item.output)}">复制</button>
                </div>
              </article>
            `;
          })
          .join("");

        listEl.querySelectorAll("[data-card]").forEach((card) => {
          const pick = () => {
            selectItem(findByOutput(card.dataset.card));
          };
          card.addEventListener("click", pick);
          card.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              pick();
            }
          });
        });
        listEl.querySelectorAll(".row-actions").forEach((actions) => {
          actions.addEventListener("click", (event) => event.stopPropagation());
        });
        listEl.querySelectorAll("[data-copy]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = findByOutput(button.dataset.copy);
            selectItem(item);
            copyInstall(item);
          });
        });
      }

      function renderCategories() {
        const counts = new Map();
        state.items.forEach((item) => {
          splitCategories(item).forEach((category) => {
            counts.set(category, (counts.get(category) || 0) + 1);
          });
        });
        state.categories = [...counts.entries()]
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "zh-Hans-CN"))
          .map(([name, count]) => ({ name, count }));

        categoryCountEl.textContent = state.categories.length;
        categorySelect.innerHTML = '<option value="">全部分类</option>' + state.categories
          .map(({ name, count }) => `<option value="${escapeHtml(name)}">${escapeHtml(name)} (${count})</option>`)
          .join("");
      }

      function findByOutput(output) {
        return state.items.find((item) => item.output === output);
      }

      function itemMatchesCategory(item, category) {
        if (!category) return true;
        return splitCategories(item).includes(category);
      }

      function applyFilter(options = {}) {
        const query = normalize(searchInput.value.trim());
        const category = categorySelect.value;
        state.filtered = state.items.filter((item) => {
          const haystack = normalize([
            item.name,
            item.output,
            item.category,
            item.desc,
          ].join(" "));
          return (!query || haystack.includes(query)) && itemMatchesCategory(item, category);
        });

        if (!state.selected || !state.filtered.some((item) => item.output === state.selected.output)) {
          state.selected = state.filtered[0] || state.items[0] || null;
        }
        renderList();

        if (options.scrollTop) {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      async function loadManifest() {
        const response = await fetch(RAW_MANIFEST, { cache: "no-store" });
        if (!response.ok) throw new Error(`manifest ${response.status}`);
        return response.json();
      }

      async function main() {
        try {
          const manifest = await loadManifest();
          state.items = Array.isArray(manifest.items) ? manifest.items : [];
          state.filtered = state.items;
          totalCountEl.textContent = state.items.length;
          visibleCountEl.textContent = state.items.length;
          metaEl.textContent = `共 ${state.items.length} 个模块，数据来自 ${REPO} main 分支。`;
          renderCategories();

          searchInput.addEventListener("input", () => applyFilter());
          categorySelect.addEventListener("change", () => applyFilter({ scrollTop: true }));
          resetButton.addEventListener("click", () => {
            searchInput.value = "";
            categorySelect.value = "";
            applyFilter({ scrollTop: true });
          });

          const selected = requestedModule ? findByOutput(requestedModule) : state.items[0];
          selectItem(selected || state.items[0] || null, {
            copy: Boolean(selected && shouldCopy),
            scroll: Boolean(requestedModule && selected),
          });
        } catch (error) {
          metaEl.textContent = "模块列表载入失败。";
          listEl.innerHTML = '<div class="empty load-error">无法载入 manifest.json，请稍后重试。</div>';
          totalCountEl.textContent = "0";
          visibleCountEl.textContent = "0";
          categoryCountEl.textContent = "0";
        }
      }

      main();
    </script>
  </body>
</html>
